<script>

// ║  FIREBASE CONFIG — PASTE YOUR OWN CONFIG VALUES BELOW       ║

// ╚══════════════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey:            "AIzaSyDUJi7f12pWJdH9ay-BtrfhOSlJKowwBJc",
  authDomain:        "laen380-quiz.firebaseapp.com",
  projectId:         "laen380-quiz",
  storageBucket:     "laen380-quiz.firebasestorage.app",
  messagingSenderId: "48071944799",
  appId:             "1:48071944799:web:48e1d45d9e55fcfd5249ea"
};

// --- Initialize Firebase ---
let db;
let firebaseReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  // Enable offline persistence so quiz works even with spotty internet
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  firebaseReady = !firebaseConfig.apiKey.includes('PASTE');
} catch(e) {
  console.warn('Firebase init failed, falling back to localStorage:', e);
}

const TEACHER_USER='yungie', TEACHER_PASS='yungie1234', MAX_ATTEMPTS=3, TOTAL_PARTS=8;

// ---- SESSION (always local) ----
function getUser(){return JSON.parse(sessionStorage.getItem('laen380_user')||'null')}
function setUser(u){sessionStorage.setItem('laen380_user',JSON.stringify(u))}

// ---- DATA LAYER — Firebase with localStorage fallback ----
function defaultUserData(email){
  const d={name:'',email,parts:{},savedProgress:{}};
  for(let i=1;i<=TOTAL_PARTS;i++) d.parts[i]={attempts:0,scores:[],bestScore:0};
  return d;
}

async function getUserData(email){
  if(firebaseReady){
    try{
      const doc=await db.collection('students').doc(email).get();
      if(doc.exists){
        const data=doc.data();
        // Ensure all parts exist (defensive)
        for(let i=1;i<=TOTAL_PARTS;i++) if(!data.parts[i]) data.parts[i]={attempts:0,scores:[],bestScore:0};
        if(!data.savedProgress) data.savedProgress={};
        return data;
      } else {
        const d=defaultUserData(email);
        await db.collection('students').doc(email).set(d);
        return d;
      }
    }catch(e){console.error('Firestore read error:',e); return localGetUser(email);}
  }
  return localGetUser(email);
}

async function saveUserData(email,data){
  if(firebaseReady){
    try{await db.collection('students').doc(email).set(data);return;}
    catch(e){console.error('Firestore write error:',e);}
  }
  localSaveUser(email,data);
}

async function getAllStudents(){
  if(firebaseReady){
    try{
      const snap=await db.collection('students').get();
      return snap.docs.map(d=>d.data());
    }catch(e){console.error('Firestore read all error:',e);return localGetAllStudents();}
  }
  return localGetAllStudents();
}

// localStorage fallback
function localGetUser(email){
  const s=JSON.parse(localStorage.getItem('laen380_data')||'{}');
  if(!s.users)s.users={};
  if(!s.users[email]){s.users[email]=defaultUserData(email);localStorage.setItem('laen380_data',JSON.stringify(s));}
  return s.users[email];
}
function localSaveUser(email,data){
  const s=JSON.parse(localStorage.getItem('laen380_data')||'{}');
  if(!s.users)s.users={};s.users[email]=data;
  localStorage.setItem('laen380_data',JSON.stringify(s));
}
function localGetAllStudents(){
  const s=JSON.parse(localStorage.getItem('laen380_data')||'{}');
  return Object.values(s.users||{});
}

// ---- UTILITIES ----
function speakText(text){
  if('speechSynthesis' in window){window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.rate=0.9;u.pitch=1;u.lang='en-US';
  const v=window.speechSynthesis.getVoices(),e=v.find(x=>x.lang.startsWith('en'));
  if(e)u.voice=e;window.speechSynthesis.speak(u);}
}
// ---- AUDIO PLAYER ----
let audioState={playing:false,utterance:null,timer:null,startTime:0,elapsed:0,duration:0};
function playAudio(text){
  stopAudio();if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(text);u.rate=0.9;u.pitch=1;u.lang='en-US';
  const v=window.speechSynthesis.getVoices(),eng=v.find(x=>x.lang.startsWith('en'));
  if(eng)u.voice=eng;
  const words=text.split(/\s+/).length,estDur=Math.round(words/2.25);
  audioState={playing:true,utterance:u,timer:null,startTime:Date.now(),elapsed:0,duration:estDur};
  u.onend=()=>{audioState.playing=false;updAudioUI(100,estDur,estDur);clearInterval(audioState.timer);};
  audioState.timer=setInterval(()=>{if(!audioState.playing)return clearInterval(audioState.timer);
    audioState.elapsed=Math.round((Date.now()-audioState.startTime)/1000);
    updAudioUI(Math.min(100,Math.round(audioState.elapsed/estDur*100)),audioState.elapsed,estDur);},250);
  window.speechSynthesis.speak(u);
}
function pauseAudio(){if(window.speechSynthesis.speaking){window.speechSynthesis.pause();audioState.playing=false;clearInterval(audioState.timer);const b=document.getElementById('a-play');if(b)b.textContent='▶';}}
function resumeAudio(){if(window.speechSynthesis.paused){window.speechSynthesis.resume();audioState.playing=true;audioState.startTime=Date.now()-audioState.elapsed*1000;audioState.timer=setInterval(()=>{audioState.elapsed=Math.round((Date.now()-audioState.startTime)/1000);updAudioUI(Math.min(100,Math.round(audioState.elapsed/audioState.duration*100)),audioState.elapsed,audioState.duration);},250);const b=document.getElementById('a-play');if(b)b.textContent='⏸';}}
function toggleAudio(text){if(window.speechSynthesis.paused)resumeAudio();else if(audioState.playing)pauseAudio();else playAudio(text);}
function stopAudio(){window.speechSynthesis.cancel();audioState.playing=false;clearInterval(audioState.timer);updAudioUI(0,0,0);}
function updAudioUI(pct,el,tot){const f=document.getElementById('a-fill');if(f)f.style.width=pct+'%';const t=document.getElementById('a-time');if(t)t.textContent=fmt(el)+'/'+fmt(tot);const b=document.getElementById('a-play');if(b)b.textContent=audioState.playing?'⏸':'▶';}
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
function toggleTranscript(){const t=document.getElementById('transcript');if(t)t.style.display=t.style.display==='none'?'block':'none';}
function audioHTML(text){const safe=text.replace(/`/g,"'").replace(/\\/g,"\\\\");return `<div class="audio-player"><div class="audio-controls"><button id="a-play" onclick="toggleAudio(\`${safe}\`)">▶</button><button class="stop-btn" onclick="stopAudio()">⏹</button><div class="audio-progress"><div class="audio-progress-fill" id="a-fill" style="width:0%"></div></div><span class="audio-time" id="a-time">0:00/0:00</span></div><button class="transcript-toggle" onclick="toggleTranscript()">📄 Show / Hide Transcript ▾</button><div class="transcript-box" id="transcript" style="display:none">${text}</div></div>`;}

function launchConfetti(){
  const c=['#111','#666','#999','#DDD','#4ADE80','#888'];
  for(let i=0;i<35;i++){const el=document.createElement('div');el.className='confetti-piece';
  el.style.left=Math.random()*100+'vw';el.style.width=(Math.random()*8+4)+'px';
  el.style.height=(Math.random()*8+4)+'px';el.style.background=c[Math.floor(Math.random()*c.length)];
  el.style.borderRadius=Math.random()>.5?'50%':'2px';el.style.animationDelay=Math.random()*2+'s';
  el.style.animationDuration=(Math.random()*2+2)+'s';document.body.appendChild(el);
  setTimeout(()=>el.remove(),5000);}
}

const QUIZ_DATA = {
  1: {

    icon: "🏗️",
    color: "brand",
    description: "Identify the organizational pattern used in short presentation excerpts.",
    totalQ: 17,
    questions: [
      { id:1, type:'mcq', audio:"Today, I want to walk you through the remarkable evolution of artificial intelligence and how it has shaped our modern world. It all began in 1956 at the Dartmouth Conference, where researchers first coined the term artificial intelligence. By the 1980s, expert systems emerged as the first practical applications in industry. In the 2000s, machine learning gained significant traction, transforming data analysis. And now, in the 2020s, generative AI and large language models are revolutionizing virtually every sector of the global economy.", q:"What organizational pattern does this presentation use?", options:["Chronological","Spatial","Cause-Effect","Topical"], correct:0 },
      { id:2, type:'mcq', audio:"Imagine walking into the newly renovated campus library at our university. As you enter through the main doors, on your immediate left you will find the collaborative learning zones featuring modular furniture and interactive whiteboards. Straight ahead lies the impressive three-story glass atrium that houses the state-of-the-art digital media center. If you take the elevator to the upper floors, you will discover individual quiet study pods designed for focused concentration. Finally, the rooftop level features a beautifully landscaped open-air reading garden with panoramic campus views.", q:"What organizational pattern does this presentation use?", options:["Spatial","Chronological","Problem-Solution","Compare and Contrast"], correct:0 },
      { id:3, type:'mcq', audio:"Our university is facing a critical challenge that demands immediate attention. Student mental health issues have surged by approximately forty percent since 2020, according to the latest institutional research data. University counseling centers are overwhelmed with unprecedented demand, and wait times now frequently exceed three weeks for an initial appointment. Many students have simply given up seeking professional help altogether. To address this growing crisis, I propose three targeted solutions: first, expanding telehealth counseling services; second, training peer support ambassadors across all faculties; and third, integrating mandatory wellness modules into every academic course.", q:"What organizational pattern does this presentation use?", options:["Cause-Effect","Problem-Solution","Argumentative","Monroe's Motivated Sequence"], correct:1 },
      { id:4, type:'mcq', audio:"Social media addiction among teenagers leads to several consequences. First, excessive screen time causes disrupted sleep patterns. Second, constant comparison with curated online profiles results in lower self-esteem. Third, reduced face-to-face interaction weakens interpersonal skills. These combined effects contribute to rising anxiety and depression rates.", q:"What organizational pattern does this presentation use?", options:["Problem-Solution","Topical","Cause-Effect","Sequential"], correct:2 },
      { id:5, type:'mcq', audio:"Let me compare two popular renewable energy sources. Solar panels are cheaper to install and maintain, work silently, but depend on sunlight availability. Wind turbines generate power day and night, occupy less ground space, but produce noise and require higher initial investment. Both contribute significantly to reducing carbon emissions.", q:"What organizational pattern does this presentation use?", options:["Topical","Compare and Contrast","Cause-Effect","Definition"], correct:1 },
      { id:6, type:'mcq', audio:"Do you know that every eight seconds, a student drops out of high school in the United States? That is a crisis. These young people face limited career prospects and lower lifetime earnings. We need to act. Schools should implement early-warning systems to identify at-risk students. Imagine a future where every student graduates prepared for success. Start by supporting your local mentoring program today.", q:"What organizational pattern does this presentation use?", options:["Problem-Solution","Chronological","Monroe's Motivated Sequence","Argumentative"], correct:2 },
      { id:7, type:'mcq', audio:"To prepare an effective academic presentation, follow these five steps. Step one: research your topic thoroughly using credible sources. Step two: create an outline with clear main points. Step three: design visual aids that support your message. Step four: rehearse your delivery at least three times. Step five: prepare for audience questions.", q:"What organizational pattern does this presentation use?", options:["Sequential","Chronological","Topical","Spatial"], correct:0 },
      { id:8, type:'mcq', audio:"The electric vehicle market can be understood through three key aspects. First, the technology: battery range now exceeds 400 kilometers per charge. Second, the economics: total cost of ownership is now competitive with gasoline vehicles. Third, the infrastructure: charging networks are expanding rapidly across Southeast Asia.", q:"What organizational pattern does this presentation use?", options:["Sequential","Cause-Effect","Topical","Problem-Solution"], correct:2 },
      { id:9, type:'mcq', audio:"I firmly believe that universities should mandate a foreign language requirement for all undergraduate students. Research from the British Council shows multilingual graduates earn 15% more. Moreover, language learning enhances cognitive flexibility and cross-cultural competence. Critics argue this adds workload, but the professional advantages clearly outweigh the costs.", q:"What organizational pattern does this presentation use?", options:["Compare and Contrast","Cause-Effect","Definition","Argumentative"], correct:3 },
      { id:10, type:'mcq', audio:"What exactly is design thinking? It is a human-centered approach to innovation that draws from the designer's toolkit to integrate the needs of people, the possibilities of technology, and the requirements for business success. It is not simply about aesthetics. Rather, it is a methodology for creative problem-solving that emphasizes empathy and iteration.", q:"What organizational pattern does this presentation use?", options:["Argumentative","Problem-Solution","Definition","Topical"], correct:2 },
      { id:11, type:'mcq', audio:"Let me start with the general principle: effective communication is the foundation of professional success. Now let me support this with specifics. In a 2024 LinkedIn survey, 92% of hiring managers ranked communication as their top desired skill. At Mahidol University, students who completed presentation courses reported 35% higher internship placement rates.", q:"What organizational pattern does this presentation use?", options:["Inductive","Deductive","Chronological","Topical"], correct:1 },
      { id:12, type:'mcq', audio:"First, consider this observation: Thailand's air pollution levels spike every February. Next, note that hospital admissions for respiratory illness rise 28% during the same period. Additionally, outdoor exercise participation drops by 45%. School attendance falls by 12%. All these specific pieces of evidence point to one conclusion: seasonal air pollution creates a public health emergency requiring immediate policy action.", q:"What organizational pattern does this presentation use?", options:["Deductive","Inductive","Cause-Effect","Problem-Solution"], correct:1 },
      { id:13, type:'mcq', audio:"Today I want to discuss three reasons why plant-based diets are gaining popularity. The cost of meat is rising sharply due to increased corn and feed prices. Health research shows that meat consumption is linked to heart disease and certain cancers. Environmental data reveals that livestock farming contributes significantly to greenhouse gas emissions.", q:"What organizational pattern does this presentation use?", options:["Compare and Contrast","Topical","Argumentative","Cause-Effect"], correct:2 },
      { id:14, type:'mcq', audio:"The history of pandemics has shaped modern medicine profoundly. The Black Death in the 14th century led to the concept of quarantine. The 1918 Spanish Flu prompted the development of public health infrastructure. The HIV/AIDS crisis of the 1980s revolutionized pharmaceutical research. And COVID-19 accelerated vaccine technology to unprecedented levels.", q:"What organizational pattern does this presentation use?", options:["Spatial","Chronological","Sequential","Topical"], correct:1 },
      { id:15, type:'mcq', audio:"Picture this scenario at a university dormitory. The main entrance has no wheelchair ramp. The elevator buttons lack braille labels. Hallway widths do not meet accessibility standards. This problem affects 8% of enrolled students with physical disabilities. The solution is a comprehensive accessibility audit and renovation plan costing only 2% of the annual facility budget.", q:"What organizational pattern does this presentation use?", options:["Spatial then Problem-Solution","Chronological","Pure Spatial","Compare and Contrast"], correct:0 }
    ]
  },

// ---- QUIZ ENGINE ----
let currentQuiz={part:0,qIndex:0,answers:{},started:false};

async function startQuiz(partNum){
  const user=getUser(),data=await getUserData(user.email);
  if(data.parts[partNum].attempts>=MAX_ATTEMPTS){alert('You have used all 3 attempts for this part.');return;}
  currentQuiz={part:partNum,qIndex:0,answers:{},started:true};
  if(data.savedProgress&&data.savedProgress[partNum]){const s=data.savedProgress[partNum];currentQuiz.answers=s.answers||{};currentQuiz.qIndex=s.qIndex||0;}
  renderQuestion();
}

async function renderQuestion(){
  const part=QUIZ_DATA[currentQuiz.part],q=part.questions[currentQuiz.qIndex],total=part.questions.length;
  const progress=Math.round((currentQuiz.qIndex/total)*100);
  const user=getUser(),data=await getUserData(user.email),attemptNum=data.parts[currentQuiz.part].attempts+1;
  let qHTML='';
  if(currentQuiz.part===6&&part.videos){
    const vid=part.videos.find(v=>q.id>=v.qRange[0]&&q.id<=v.qRange[1]);
    if(vid)qHTML+=`<div class="mb-4"><p style="font-size:15px;font-weight:600;color:#888;margin-bottom:8px">📹 ${vid.title}</p><div class="video-wrap"><iframe src="${vid.url}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div></div>`;
  }
  if(q.audio)qHTML+=audioHTML(q.audio);
  qHTML+=`<p style="font-size:18px;font-weight:500;color:#111;line-height:1.7;margin-bottom:18px">${q.q}</p>`;
  if(q.type==='mcq'){
    const L=['A','B','C','D'];
    q.options.forEach((opt,i)=>{const sel=currentQuiz.answers[q.id]===i;
      qHTML+=`<div onclick="selectAnswer(${q.id},${i})" class="quiz-option ${sel?'selected':''}">
        <span class="opt-letter">${L[i]}</span><span style="font-size:17px;color:#333;line-height:1.6">${opt}</span></div>`;});
  } else if(q.type==='reorder'){
    if(!currentQuiz.answers[q.id])currentQuiz.answers[q.id]=shuffle([...Array(q.items.length).keys()]);
    const order=currentQuiz.answers[q.id];
    qHTML+=`<p style="font-size:14px;color:#aaa;margin-bottom:10px">↕️ Drag to reorder (top = first / most casual → bottom = last / most formal)</p>`;
    order.forEach((idx,pos)=>{
      qHTML+=`<div draggable="true" ondragstart="dragStart(event,${pos})" ondragover="dragOver(event,${pos})" ondrop="dropItem(event,${pos})" ondragend="dragEnd(event)" class="drag-item">
        <span class="drag-num">${pos+1}</span><span style="font-size:16px;color:#333">${q.items[idx]}</span></div>`;});
  }
  renderPage(`<div class="page">
    <div class="nav"><div class="nav-inner" style="max-width:760px">
      <button onclick="saveAndReturn()" class="btn btn-outline sm">← Back to Dashboard</button>
      <span style="font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:#333">${part.icon} Part ${currentQuiz.part}</span>
      <span style="font-size:14px;color:#aaa">Attempt ${attemptNum}/3</span>
    </div></div>
    <div class="wrap-md" style="padding-top:20px;padding-bottom:40px">
      <div class="mb-4"><div class="flex justify-between" style="font-size:14px;color:#aaa;margin-bottom:6px"><span>Question ${currentQuiz.qIndex+1} of ${total}</span><span>${progress}%</span></div>
        <div class="pbar"><div class="pfill" style="width:${progress}%"></div></div></div>
      <div class="card fade-in" style="padding:28px 24px">${qHTML}</div>
      <div class="flex justify-between gap-3" style="margin-top:20px">
        <button onclick="${currentQuiz.qIndex>0?'prevQuestion()':'void(0)'}" class="btn btn-outline" ${currentQuiz.qIndex===0?'style="opacity:.35;cursor:default"':''}>← Previous Question</button>
        <button onclick="saveProgress()" class="btn btn-outline sm">💾 Save For Later</button>
        ${currentQuiz.qIndex<total-1?`<button onclick="nextQuestion()" class="btn btn-dark">Next Question →</button>`:`<button onclick="submitQuiz()" class="btn btn-success">✓ Submit</button>`}
      </div>
    </div>
  </div>`);
}

function selectAnswer(qId,optIdx){currentQuiz.answers[qId]=optIdx;renderQuestion();}
let dragStartPos=null;
function dragStart(e,pos){dragStartPos=pos;e.target.classList.add('dragging')}
function dragOver(e,pos){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function dragEnd(e){document.querySelectorAll('.drag-item').forEach(el=>el.classList.remove('dragging','drag-over'))}
function dropItem(e,pos){e.preventDefault();const q=QUIZ_DATA[currentQuiz.part].questions[currentQuiz.qIndex],order=currentQuiz.answers[q.id];
  if(dragStartPos!==null&&dragStartPos!==pos){const item=order.splice(dragStartPos,1)[0];order.splice(pos,0,item);}dragStartPos=null;renderQuestion();}
function nextQuestion(){if(currentQuiz.qIndex<QUIZ_DATA[currentQuiz.part].questions.length-1){currentQuiz.qIndex++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function prevQuestion(){if(currentQuiz.qIndex>0){currentQuiz.qIndex--;renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
async function saveProgress(){const user=getUser(),data=await getUserData(user.email);if(!data.savedProgress)data.savedProgress={};
  data.savedProgress[currentQuiz.part]={answers:currentQuiz.answers,qIndex:currentQuiz.qIndex};await saveUserData(user.email,data);alert('Your current answers have been saved for now. You can continue completing this part of the quiz later.');}
async function saveAndReturn(){await saveProgress();showDashboard();}

async function submitQuiz(){
  showLoading('Submitting...');
  const part=QUIZ_DATA[currentQuiz.part],user=getUser(),data=await getUserData(user.email);
  let score=0;const results=[];
  part.questions.forEach(q=>{let correct=false;
    if(q.type==='mcq')correct=currentQuiz.answers[q.id]===q.correct;
    else if(q.type==='reorder')correct=JSON.stringify(currentQuiz.answers[q.id]||[])===JSON.stringify(q.correctOrder);
    if(correct)score++;results.push({qId:q.id,correct,userAnswer:currentQuiz.answers[q.id],correctAnswer:q.type==='mcq'?q.correct:q.correctOrder});});
  data.parts[currentQuiz.part].attempts++;data.parts[currentQuiz.part].scores.push(score);
  if(score>data.parts[currentQuiz.part].bestScore)data.parts[currentQuiz.part].bestScore=score;
  if(data.savedProgress)delete data.savedProgress[currentQuiz.part];
  await saveUserData(user.email,data);
  const pct=Math.round(score/part.questions.length*100);if(pct>=80)launchConfetti();
  showResults(currentQuiz.part,results,score,data.parts[currentQuiz.part].attempts);
}

async function showResults(partNum,results,score,attemptNum){
  const part=QUIZ_DATA[partNum],pct=Math.round(score/part.questions.length*100),showCorrect=attemptNum>=MAX_ATTEMPTS;
  const user=getUser(),data=await getUserData(user.email),attLeft=MAX_ATTEMPTS-attemptNum;
  let emoji=pct>=90?'🌟':pct>=80?'🎉':pct>=60?'💪':pct>=40?'📚':'🔄';
  let msg=pct>=90?'Outstanding!':pct>=80?'Great job!':pct>=60?'Good effort!':pct>=40?'Keep practicing!':'Review and try again!';
  let rHTML='';
  results.forEach((r,i)=>{const q=part.questions[i];
    if(r.correct){rHTML+=`<div style="padding:10px 14px;border-radius:8px;background:#F0FDF4;border:1px solid #BBF7D0;margin-bottom:8px;font-size:13px"><strong style="color:#166534">✓ Q${i+1}</strong> <span style="color:#166534">Correct</span></div>`;}
    else{let detail='';
      if(showCorrect&&q.type==='mcq')detail=`<div style="margin-top:4px;font-size:12px;color:#666">Correct: <strong style="color:#166534">${q.options[q.correct]}</strong></div>`;
      else if(showCorrect&&q.type==='reorder')detail=`<div style="margin-top:4px;font-size:11px;color:#666">Correct order: ${q.correctOrder.map((idx,pos)=>(pos+1)+'. '+q.items[idx].substring(0,35)+'...').join(' → ')}</div>`;
      rHTML+=`<div style="padding:10px 14px;border-radius:8px;background:#FEF2F2;border:1px solid #FECACA;margin-bottom:8px;font-size:13px"><strong style="color:#991B1B">✗ Q${i+1}</strong> <span style="color:#991B1B">Incorrect</span>${!showCorrect?'<span style="font-size:11px;color:#aaa;margin-left:6px">(Answer hidden until attempt 3)</span>':''}${detail}</div>`;}
  });
  renderPage(`<div class="page fade-in" style="padding:32px 0"><div class="wrap-md">
    <div class="card text-center slide-up" style="padding:36px 28px;margin-bottom:20px">
      <div style="font-size:52px;margin-bottom:10px">${emoji}</div>
      <h2 style="font-size:26px;font-weight:700">${msg}</h2>
      <p style="font-size:15px;color:#888;margin:6px 0 16px">Part ${partNum}: ${part.title} — Attempt ${attemptNum}</p>
      <div style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:#F5F5F5;border-radius:999px">
        <span style="font-size:28px;font-weight:700;color:#111">${score}/${part.questions.length}</span><span style="color:#888">(${pct}%)</span>
      </div>
      <p style="font-size:13px;color:#aaa;margin-top:12px">Best: ${data.parts[partNum].bestScore}/${part.questions.length} · ${attLeft>0?attLeft+' attempt(s) left':'All attempts used'}</p>
    </div>
    <div class="card" style="padding:24px;margin-bottom:20px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Question Review</h3>
      ${!showCorrect?'<div class="alert alert-amber mb-4">ℹ️ Correct answers shown after attempt 3.</div>':'<div class="alert alert-green mb-4">✅ All correct answers displayed.</div>'}
      ${rHTML}
    </div>
    <div class="flex gap-3">${attLeft>0?`<button onclick="startQuiz(${partNum})" class="btn btn-dark flex-1">Try Again</button>`:''}<button onclick="showDashboard()" class="btn btn-outline flex-1">← Dashboard</button></div>
  </div></div>`);
}

// ---- LOGOUT ----
async function handleLogout(){
  const user=getUser();if(!user){showLogin();return;}
  const data=await getUserData(user.email);let sHTML='',totalBest=0,totalPossible=0;
  for(let i=1;i<=TOTAL_PARTS;i++){const p=QUIZ_DATA[i],pd=data.parts[i];totalBest+=pd.bestScore;totalPossible+=p.totalQ;
    const pct=p.totalQ>0?Math.round(pd.bestScore/p.totalQ*100):0;
    sHTML+=`<div class="flex items-center justify-between" style="padding:10px 0;border-bottom:1px solid #F0F0F0">
      <span style="font-size:15px;color:#555">${p.icon} Part ${i}: ${p.title}</span>
      <span style="font-size:16px;font-weight:700;color:${pct>=80?'#166534':pct>=50?'#92400E':'#aaa'}">${pd.bestScore}/${p.totalQ} (${pct}%)</span></div>`;}
  const overallPct=Math.round(totalBest/totalPossible*100),finalScore=(totalBest/totalPossible*15).toFixed(2);
  renderPage(`<div class="page-center fade-in">
    <div class="card slide-up" style="padding:36px 32px;max-width:480px;width:100%">
      <div class="text-center mb-6"><div style="font-size:42px;margin-bottom:8px">📊</div><h2 style="font-size:22px;font-weight:700">Score Summary</h2><p style="font-size:15px;color:#888">${user.name} — ${user.email}</p></div>
      <div class="text-center" style="padding:16px;background:#111;border-radius:10px;margin-bottom:20px;color:#fff">
        <div style="font-size:36px;font-weight:700">${overallPct}%</div>
        <div style="font-size:13px;color:#999">${totalBest}/${totalPossible} total points</div>
        <div style="font-size:14px;font-weight:600;color:#4ADE80;margin-top:4px">Grade: ${finalScore} / 15%</div>
      </div>
      <div class="mb-6">${sHTML}</div>
      <button onclick="confirmLogout()" class="btn btn-dark w-full">Confirm Logout</button>
      <button onclick="showDashboard()" class="btn btn-outline w-full" style="margin-top:8px">← Return</button>
    </div>
  </div>`);
}
function confirmLogout(){sessionStorage.removeItem('laen380_user');showLogin()}

let teacherUnsub = null; // Firestore real-time listener

async function showTeacherDashboard(){
  showLoading('Loading student data...');
  const studentList = await getAllStudents();
  renderTeacherTable(studentList);

  // Start real-time listener if Firebase is active
  if(firebaseReady && !teacherUnsub){
    teacherUnsub = db.collection('students').onSnapshot(snap=>{
      const live = snap.docs.map(d=>d.data());
      renderTeacherTable(live);
    });
  }
}

function renderTeacherTable(studentList){
  let tableHTML='';
  studentList.forEach(s=>{
    if(!s.parts) return;
    let tB=0,tP=0;
    for(let i=1;i<=TOTAL_PARTS;i++){tB+=(s.parts[i]?s.parts[i].bestScore:0);tP+=QUIZ_DATA[i].totalQ;}
    const pct=tP>0?Math.round(tB/tP*100):0,fs=tP>0?(tB/tP*15).toFixed(2):'0.00';
    let ps='';for(let i=1;i<=TOTAL_PARTS;i++){const pd=s.parts[i]||{bestScore:0,attempts:0};
      ps+=`<td class="text-center" style="font-size:12px;padding:8px 4px">
        <div style="font-weight:600;color:#111">${pd.bestScore}/${QUIZ_DATA[i].totalQ}</div>
        <div style="font-size:10px;color:#aaa">${pd.attempts} att</div></td>`;}
    const safeEmail = s.email.replace(/'/g,"\\'");
    tableHTML+=`<tr>
      <td style="font-weight:500;color:#111;white-space:nowrap">${s.name||'—'}</td>
      <td style="font-size:14px;color:#888">${s.email}</td>
      ${ps}
      <td class="text-center" style="font-weight:700;color:${pct>=80?'#166534':pct>=50?'#111':'#DC2626'}">${pct}%</td>
      <td class="text-center" style="font-weight:700;color:#111">${fs}</td>
      <td class="text-center"><button onclick="openStudentModal('${safeEmail}')" class="btn btn-outline sm" style="font-size:11px;padding:4px 10px">✏️ Edit</button></td>
    </tr>`;
  });
  let pH='';for(let i=1;i<=TOTAL_PARTS;i++)pH+=`<th class="text-center" style="padding:8px 4px;font-size:10px">P${i}</th>`;
  const activeCount=studentList.filter(s=>{if(!s.parts)return false;let t=0;for(let i=1;i<=TOTAL_PARTS;i++)t+=(s.parts[i]?s.parts[i].attempts:0);return t>0;}).length;
  const avgPct=studentList.length>0?Math.round(studentList.reduce((a,s)=>{if(!s.parts)return a;let t=0,p=0;for(let i=1;i<=TOTAL_PARTS;i++){t+=(s.parts[i]?s.parts[i].bestScore:0);p+=QUIZ_DATA[i].totalQ;}return a+(p>0?t/p*100:0);},0)/studentList.length)+'%':'—';
  const liveTag = firebaseReady ? '<span class="live-dot"></span>Live' : 'Local only';

  renderPage(`<div class="page">
    <div class="nav"><div class="nav-inner" style="max-width:1200px">
      <div class="flex items-center gap-2"><span style="font-size:18px">📊</span><strong style="font-family:'Outfit',sans-serif;color:#111">Teacher Dashboard</strong>
        <span style="font-size:11px;color:#4ADE80;display:inline-flex;align-items:center;gap:2px;margin-left:8px">${liveTag}</span></div>
      <div class="flex gap-2">
        <button onclick="exportCSV()" class="btn btn-outline sm">📥 CSV</button>
        <button onclick="teacherLogout()" class="btn btn-outline sm">Logout</button>
      </div>
    </div></div>
    <div class="wrap-lg" style="padding-top:24px;padding-bottom:40px">
      <div class="grid grid-1 md-grid-3 gap-4 mb-6">
        <div class="card text-center" style="padding:20px"><div style="font-size:32px;font-weight:700;color:#111">${studentList.length}</div><div style="font-size:15px;color:#888">Total Students</div></div>
        <div class="card text-center" style="padding:20px"><div style="font-size:32px;font-weight:700;color:#111">${activeCount}</div><div style="font-size:15px;color:#888">Active Students</div></div>
        <div class="card text-center" style="padding:20px"><div style="font-size:32px;font-weight:700;color:#111">${avgPct}</div><div style="font-size:15px;color:#888">Average Score</div></div>
      </div>
      <div class="card overflow-x-auto">
        <table><thead><tr><th>Name</th><th>Email</th>${pH}<th class="text-center">Overall</th><th class="text-center">Grade/15</th><th class="text-center">Actions</th></tr></thead>
        <tbody>${tableHTML||'<tr><td colspan="13" class="text-center" style="padding:40px;color:#aaa">No student data yet.</td></tr>'}</tbody></table>
      </div>
    </div>
    <div id="modal-root"></div>
  </div>`);
}

function teacherLogout(){
  if(teacherUnsub){teacherUnsub();teacherUnsub=null;}
  showLogin();
}

    const pd=data.parts[i],p=QUIZ_DATA[i];
    partsHTML+=`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0F0F0;flex-wrap:wrap;gap:8px">
        <div style="flex:1;min-width:140px">
          <span style="font-size:13px;font-weight:600;color:#111">${p.icon} P${i}: ${p.title}</span>
          <div style="font-size:11px;color:#aaa;margin-top:2px">Attempts: ${pd.attempts}/${MAX_ATTEMPTS} · Best: ${pd.bestScore}/${p.totalQ}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <label style="font-size:11px;color:#888">Score:</label>
          <input id="score-p${i}" type="number" min="0" max="${p.totalQ}" value="${pd.bestScore}" style="width:52px;padding:4px 6px;border:1.5px solid #D4D4D4;border-radius:6px;font-size:13px;text-align:center"/>
          <span style="font-size:11px;color:#aaa">/${p.totalQ}</span>
          <label style="font-size:11px;color:#888;margin-left:4px">Att:</label>
          <input id="att-p${i}" type="number" min="0" max="3" value="${pd.attempts}" style="width:42px;padding:4px 6px;border:1.5px solid #D4D4D4;border-radius:6px;font-size:13px;text-align:center"/>
          <button onclick="resetOnePart('${email}',${i})" class="btn btn-danger" title="Reset to 0/0">↺</button>
        </div>
      </div>`;
  }
  const safeEmail = email.replace(/'/g,"\\'");
  const modalHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal slide-up">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">
        <div><h3 style="font-size:18px;font-weight:700">${data.name||'Student'}</h3><p style="font-size:14px;color:#888">${email}</p></div>
        <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0">✕</button>
      </div>
      <div style="font-size:12px;color:#666;padding:12px;background:#F5F5F5;border-radius:8px;margin-bottom:16px;line-height:1.7">
        <strong>Override scores:</strong> Edit the score number directly.<br>
        <strong>Edit attempts:</strong> Change attempt count (set to 0 to allow retakes).<br>
        <strong>↺ Reset:</strong> Resets that part to 0 score and 0 attempts.<br>
        <strong>Save:</strong> Click "Save All Changes" to apply to the live database.
      </div>
      <div>${partsHTML}</div>
      <div style="display:flex;gap:8px;margin-top:20px">
        <button onclick="saveStudentOverrides('${safeEmail}')" class="btn btn-dark flex-1">Save All Changes</button>
        <button onclick="closeModal()" class="btn btn-outline flex-1">Cancel</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-root').innerHTML = modalHTML;
}

function closeModal(){const mr=document.getElementById('modal-root');if(mr)mr.innerHTML='';}

async function resetOnePart(email,partNum){
  document.getElementById('score-p'+partNum).value = 0;
  document.getElementById('att-p'+partNum).value = 0;
}

async function saveStudentOverrides(email){
  const data=await getUserData(email);
  for(let i=1;i<=TOTAL_PARTS;i++){
    const sInp=document.getElementById('score-p'+i);
    const aInp=document.getElementById('att-p'+i);
    if(sInp) data.parts[i].bestScore = Math.max(0,Math.min(parseInt(sInp.value)||0,QUIZ_DATA[i].totalQ));
    if(aInp) data.parts[i].attempts = Math.max(0,Math.min(parseInt(aInp.value)||0,MAX_ATTEMPTS));
  }
  await saveUserData(email,data);
  closeModal();
  // If not using live listener, refresh manually
  if(!teacherUnsub) showTeacherDashboard();
}
